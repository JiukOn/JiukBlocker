<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JiukBlocker - Settings</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="lock-header">
    <h1>JiukBlocker</h1>
    <div class="lock-status" id="lock-status-container">
      <span id="lock-icon">🔓</span>
      <button id="unlock-btn" class="unlock-btn" style="display: none;">Unlock</button>
    </div>
  </div>

  <div class="toggle-container">
    <span class="toggle-label">Block Ads & Spam</span>
    <label class="switch">
      <input type="checkbox" id="ads-spam-toggle">
      <span class="slider"></span>
    </label>
  </div>

  <div class="toggle-container">
    <span class="toggle-label">Block NSFW Content</span>
    <label class="switch">
      <input type="checkbox" id="nsfw-toggle">
      <span class="slider"></span>
    </label>
  </div>

  <div class="nsfw-level-row" id="nsfw-level-row">
    <span class="toggle-label">NSFW Level</span>
    <select id="nsfw-level-select">
      <option value="moderate">Moderate (hide)</option>
      <option value="strict">Strict (blur)</option>
    </select>
  </div>

  <div class="toggle-container">
    <span class="toggle-label">Block Short Videos</span>
    <label class="switch">
      <input type="checkbox" id="shorts-toggle">
      <span class="slider"></span>
    </label>
  </div>

  <h2>Keyword Filter</h2>
  <div class="input-container">
    <input type="text" id="keyword-input" placeholder="Block word, channel, or /regex/..." autocomplete="off" spellcheck="false">
    <button id="add-btn">Add</button>
  </div>
  <ul id="keyword-list"></ul>

  <h2>Parental Control</h2>
  <div class="pin-setup-row">
    <input type="password" id="pin-setup-input" placeholder="New PIN (empty to remove)" autocomplete="off">
    <button id="save-pin-btn">Save</button>
  </div>

  <div class="settings-footer">
    <div class="theme-selector">
      <label for="theme-select" class="toggle-label">Theme</label>
      <select id="theme-select">
        <option value="light">Light</option>
        <option value="dark">Dark</option>
        <option value="ocean">Ocean</option>
        <option value="dracula">Dracula</option>
        <option value="midnight">Midnight</option>
        <option value="sunday">Sunday</option>
      </select>
    </div>
  </div>

  <a href="https://ko-fi.com/jiuk" target="_blank" class="kofi-btn">☕ Support the Project</a>

  <!-- PIN Modal -->
  <div class="modal-overlay" id="pin-modal">
    <div class="modal-content">
      <h3>Enter PIN to Unlock</h3>
      <input type="password" id="pin-modal-input" placeholder="Enter PIN">
      <div class="modal-actions">
        <button class="btn-cancel" id="pin-cancel-btn">Cancel</button>
        <button class="btn-submit" id="pin-submit-btn">Unlock</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
